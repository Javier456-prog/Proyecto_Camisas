<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Catálogo de Camisas</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">Lista de Camisas Disponibles</h1>
        
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for c in camisas %}
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ c.marca }}</h5>
                        <p class="card-text">
                            <strong>Talla:</strong> {{ c.talla }}<br>
                            <strong>Precio:</strong> ${{ c.precio }}
                        </p>
                    </div>
                    <div class="card-footer bg-white border-0">
                        <button class="btn btn-dark w-100">Ver Detalles</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
