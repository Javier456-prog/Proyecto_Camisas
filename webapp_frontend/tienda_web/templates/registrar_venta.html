<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrar Venta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="icon" href="data:,">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">🛒 Registrar Venta</h2>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <!-- CLIENTE -->
                <div class="mb-3">

                    <label class="form-label">
                        Cliente
                    </label>

                    <select class="form-select" name="cliente" required>

                        <option value="">Seleccione un cliente</option>

                        {% for c in clientes %}

                        <option value="{{ c.id_cliente }}"
                        {% if cliente_sel == c.id_cliente %}selected{% endif %}>

                            {{ c.nombre_cliente }} {{ c.apellido_cliente }}

                        </option>

                        {% endfor %}

                    </select>

                </div>


                <!-- EMPLEADO -->
                <div class="mb-3">

                    <label class="form-label">
                        Empleado
                    </label>

                    <select class="form-select" name="empleado" required>

                        <option value="">Seleccione un empleado</option>

                        {% for e in empleados %}

                        <option value="{{ e.id_empleado }}"
                        {% if empleado_sel|stringformat:"s" == e.id_empleado|stringformat:"s" %}selected{% endif %}>

                            {{ e.nombre_empleado }} {{ e.apellido_empleado }}

                        </option>

                        {% endfor %}

                    </select>

                </div>


                <!-- CAMISA -->
                <div class="mb-3">

                    <label class="form-label">
                        Camisa
                    </label>

                    <select class="form-select" name="camisa" required>

                        <option value="">Seleccione una camisa</option>

                        {% for c in camisas %}

                        <option value="{{ c.id_camisa }}"
                        {% if camisa_sel == c.id_camisa %}selected{% endif %}>

                            {{ c.marca }}
                            | Talla: {{ c.talla }}
                            | ${{ c.precio }}

                        </option>

                        {% endfor %}

                    </select>

                </div>


                <!-- CANTIDAD -->
                <div class="mb-4">

                    <label class="form-label">
                        Cantidad
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="cantidad"
                        min="1"
                        value="{{ cantidad_sel }}"
                        required>

                </div>


                <!-- BOTÓN -->
                <div class="d-grid">

                    <button
                        class="btn btn-success btn-lg"
                        type="submit"
                        name="registrar">

                        💾 Registrar Venta

                    </button>

                </div>

            </form>


            {% if total %}

            <div class="alert alert-info mt-4">

                <h4 class="mb-0">

                    💰 Total:
                    <strong>${{ total }}</strong>

                </h4>

            </div>

            {% endif %}


            {% if mensaje %}

            <div class="alert alert-warning mt-3">

                {{ mensaje }}

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
